<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />

    <title>Praise FM Australia</title>

    <meta
      name="description"
      content="Praise FM Australia - 24/7 Worship, Christian Hits, Gospel and Inspirational Music."
    />

    <meta
      name="keywords"
      content="Praise FM Australia, Christian Radio, Worship Music, Gospel Music, Christian Hits"
    />

    <meta name="theme-color" content="#ff6600" />

    <link rel="icon" href="/favicon.ico" />

    <link
      rel="apple-touch-icon"
      href="/icon-192.png"
    />

    <link
      rel="manifest"
      href="/manifest.webmanifest"
    />

    <script src="https://cdn.tailwindcss.com"></script>

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        font-family: 'Inter', sans-serif;
      }

      .scrollbar-hide::-webkit-scrollbar {
        display: none;
      }

      .scrollbar-hide {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(5px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .animate-fade-in {
        animation: fadeIn 0.3s ease-out forwards;
      }
    </style>
  </head>

  <body class="bg-white dark:bg-[#121212]">
    <div id="root"></div>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
